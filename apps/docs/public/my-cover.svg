<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Custom poster placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <!-- Dashed frame to signal "placeholder, replace me" -->
  <rect x="48" y="48" width="1184" height="624" rx="32" fill="none"
        stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-dasharray="14 12"/>

  <!-- Eyebrow -->
  <g transform="translate(640 260)" text-anchor="middle"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text fill="rgba(255,255,255,0.65)" font-size="22" letter-spacing="6" font-weight="600">
      CUSTOM POSTER
    </text>
  </g>

  <!-- Title -->
  <g transform="translate(640 360)" text-anchor="middle"
     font-family="ui-serif, Georgia, 'Times New Roman', serif">
    <text fill="#ffffff" font-size="92" font-weight="700" letter-spacing="-2">
      Replace with your image
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(640 420)" text-anchor="middle"
     font-family="ui-sans-serif, system-ui, sans-serif">
    <text fill="rgba(255,255,255,0.75)" font-size="26">
      pass a <tspan font-family="ui-monospace, 'Cascadia Code', monospace" fill="#fbbf24">poster</tspan> prop with any URL
    </text>
  </g>

  <!-- Corner chips -->
  <g font-family="ui-monospace, 'Cascadia Code', monospace" font-size="16" fill="rgba(255,255,255,0.7)">
    <rect x="72" y="72" width="168" height="36" rx="18" fill="rgba(0,0,0,0.35)"/>
    <text x="156" y="96" text-anchor="middle">1280 × 720</text>

    <rect x="1040" y="72" width="168" height="36" rx="18" fill="rgba(0,0,0,0.35)"/>
    <text x="1124" y="96" text-anchor="middle">16 : 9</text>
  </g>
</svg>
